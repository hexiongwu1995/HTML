<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog</title>
  <style>
    /* Alignment */
    mtable.right-align mtd,
    mtable mtd.right-align,
    mtable.left-align mtd.right-align,
    mtable.aligned mtd:nth-child(odd) {
      justify-items: end;
      text-align: right;
    }

    mtable.cases mtd,
    mtable.left-align mtd,
    mtable mtd.left-align,
    mtable.aligned mtd:nth-child(even),
    math:is(:not([display]))>mtable.multiline-equation mtd {
      justify-items: start;
      text-align: left;
    }

    mtable.cases mtd,
    mtable.aligned mtd,
    mtable mtd.flushed,
    mtable mtd.left-flush {
      padding-left: 0;
    }

    mtable.cases mtd,
    mtable.aligned mtd,
    mtable mtd.flushed,
    mtable mtd.right-flush {
      padding-right: 0;
    }

    /* Tables */
    mtable {
      math-style: inherit;
    }

    mtd {
      math-depth: auto-add;
      math-style: compact;
      math-shift: compact;
    }

    /* Equations */
    mtable.multiline-equation mtd {
      math-depth: inherit;
      math-style: inherit;
      math-shift: inherit;
      padding: 0;
    }

    math>mtable.multiline-equation mtr:not(:last-child) mtd {
      padding-bottom: 0.5em;
    }

    /* Fractions */
    mfrac {
      padding-inline: 0;
      margin-inline: 0.1em;
    }

    /* Accents */
    mover[accent="true" i]> :first-child {
      font-feature-settings: "dtls";
    }

    mover.dotted[accent="true" i]> :first-child {
      font-feature-settings: "dtls" 0;
    }

    /* Other rules for scriptlevel, displaystyle and math-shift */
    munder> :nth-child(2),
    munderover> :nth-child(2) {
      math-shift: compact
    }

    munder[accentunder="true" i]> :not(:first-child),
    mover[accent="true" i]> :not(:first-child) {
      math-depth: inherit;
      math-style: inherit;
      math-shift: inherit;
    }
  </style>
</head>

<body>
  <h1>Blog</h1>
  <p>Welcome to my blog!</p>
  <p>This is an inline math equation: <math>
      <msubsup>
        <mo lspace="0em">∫</mo>
        <mn>0</mn>
        <mi>∞</mi>
      </msubsup>
      <msup>
        <mi>𝑒</mi>
        <mrow>
          <mo>−</mo>
          <msup>
            <mi>𝑥</mi>
            <mn>2</mn>
          </msup>
        </mrow>
      </msup>
      <mi>𝑑</mi>
      <mi>𝑥</mi>
      <mo>=</mo>
      <mfrac>
        <msqrt>
          <mi>𝜋</mi>
        </msqrt>
        <mn>2</mn>
      </mfrac>
    </math></p>
  <p>This is a display math equation:</p><math display="block">
    <msubsup>
      <mo lspace="0em">∫</mo>
      <mn>0</mn>
      <mi>∞</mi>
    </msubsup>
    <msup>
      <mi>𝑒</mi>
      <mrow>
        <mo>−</mo>
        <msup>
          <mi>𝑥</mi>
          <mn>2</mn>
        </msup>
      </mrow>
    </msup>
    <mi>𝑑</mi>
    <mi>𝑥</mi>
    <mo>=</mo>
    <mfrac>
      <msqrt>
        <mi>𝜋</mi>
      </msqrt>
      <mn>2</mn>
    </mfrac>
  </math>
  <p>This blog also exists as a <a href="blog.pdf">single PDF</a>.</p>
</body>

</html>
